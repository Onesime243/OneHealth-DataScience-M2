# Nom du workflow tel qu'il apparaît dans l'onglet "Actions" de GitHub.
name: Python CI

# Déclencheurs (événements) qui lancent le workflow.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Définition des jobs (tâches) à exécuter.
jobs:
  build-and-test:  # Nom du job
    runs-on: ubuntu-latest  # L'environnement d'exécution (une machine virtuelle Linux)

    # Les étapes du job
    steps:
      # 1. Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest

      # 4. Exécuter les tests
      - name: Run tests
        run: pytest